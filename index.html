<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cek Rekening • Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1033 0%, #0f172a 100%);
      min-height: 100vh;
    }
    
    .glass {
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(167, 139, 250, 0.25);
    }
    
    .header-pill {
      background: linear-gradient(90deg, #22d3ee, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tab-active {
      background: linear-gradient(90deg, #a78bfa, #22d3ee);
      color: white;
      box-shadow: 0 10px 15px -3px rgb(167 139 250);
    }

    .neon-button {
      transition: all 0.4s ease;
    }
    
    .neon-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 25px -5px rgb(167 139 250);
    }

    .result-card {
      animation: fadeInScale 0.5s ease forwards;
    }
    
    @keyframes fadeInScale {
      0% { opacity: 0; transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body class="text-white py-12">
  <div class="max-w-3xl mx-auto px-4">
    <!-- Header -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center gap-3 bg-white/10 backdrop-blur-xl px-8 py-4 rounded-3xl border border-white/20 mb-4 shadow-2xl">
        <i class="fas fa-university text-4xl text-cyan-400"></i>
        <h1 class="text-5xl font-bold tracking-tighter header-pill">CEK REKENING</h1>
      </div>
      <p class="text-indigo-300 text-lg">Bank & E-Wallet • Real-time via cekbank.my.id</p>
    </div>

    <!-- Tab Menu -->
    <div class="flex gap-3 bg-white/10 backdrop-blur-xl p-2 rounded-3xl mb-10 w-fit mx-auto shadow-xl">
      <button onclick="switchTab('bank')" id="tab-bank"
              class="tab-active px-8 py-4 rounded-3xl font-semibold flex items-center gap-3 transition-all">
        <i class="fas fa-university"></i>
        Rekening Bank
      </button>
      <button onclick="switchTab('ewallet')" id="tab-ewallet"
              class="px-8 py-4 rounded-3xl font-semibold flex items-center gap-3 hover:bg-white/10 transition-all">
        <i class="fas fa-wallet"></i>
        E-Wallet
      </button>
    </div>

    <!-- Main Card -->
    <div class="glass rounded-3xl p-10 shadow-2xl">
      <form id="checkForm" class="space-y-8">
        <div>
          <label id="label-select" class="block text-sm font-medium text-indigo-300 mb-2">PILIH BANK</label>
          <select id="code_bank" class="w-full px-6 py-5 bg-slate-900 border border-white/10 rounded-2xl text-lg focus:outline-none focus:border-violet-400 transition-all"></select>
        </div>

        <div>
          <label class="block text-sm font-medium text-indigo-300 mb-2">NOMOR REKENING / NOMOR HP</label>
          <input type="text" id="account_number" 
                 class="w-full px-6 py-5 bg-slate-900 border border-white/10 rounded-2xl text-lg focus:outline-none focus:border-violet-400 transition-all"
                 placeholder="1820701960 atau 081234567890" required>
        </div>

        <button type="submit" id="submitBtn"
                class="neon-button w-full py-6 text-2xl font-semibold rounded-3xl bg-gradient-to-r from-violet-500 to-emerald-500 hover:from-violet-600 hover:to-emerald-600 flex items-center justify-center gap-3 shadow-xl">
          <i class="fas fa-magnifying-glass"></i>
          CEK SEKARANG
        </button>
      </form>

      <!-- Result -->
      <div id="result" class="mt-10"></div>
    </div>

    <!-- Riwayat -->
    <div class="mt-16">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-semibold flex items-center gap-3">
          <i class="fas fa-history text-emerald-400"></i>
          RIWAYAT PENGECEKAN
        </h2>
        <button onclick="clearHistory()" class="text-red-400 hover:text-red-500 flex items-center gap-2 text-sm">
          <i class="fas fa-trash"></i> HAPUS SEMUA
        </button>
      </div>
      <div id="history" class="glass rounded-3xl overflow-hidden"></div>
    </div>

    <p class="text-center text-xs text-white/40 mt-12">
      POWERED BY <span class="font-semibold">@PelrMonyetProject</span>
    </p>
  </div>

  <script>
    // Data Bank & E-Wallet
    const banks = [
      { value: "bca", label: "BCA" },
      { value: "bni", label: "BNI" },
      { value: "bri", label: "BRI" },
      { value: "mandiri", label: "Mandiri" },
      { value: "bsm", label: "BSI Syariah" },
      { value: "btn", label: "BTN" },
      { value: "permata", label: "Permata Bank" },
      { value: "danamon", label: "Danamon" },
      { value: "cimb", label: "CIMB Niaga" },
      { value: "ocbc", label: "OCBC NISP" },
      { value: "maybank", label: "Maybank" },
      { value: "bjb", label: "BJB" },
      { value: "panin", label: "Panin Bank" },
      { value: "jago", label: "Bank Jago" },
      { value: "mega", label: "Bank Mega" },
      { value: "kesejahteraan_ekonomi", label: "Seabank" },
      { value: "sinarmas", label: "Bank Sinarmas" },
      { value: "tabungan_pensiunan_nasional", label: "Jenius / BTPN" }
    ];

    const ewallet = [
      { value: "gopay", label: "GoPay" },
      { value: "ovo", label: "OVO" },
      { value: "dana", label: "Dana" },
      { value: "shopeepay", label: "ShopeePay" },
      { value: "linkaja", label: "LinkAja" }
    ];

    let currentTab = 'bank';
    const bankMap = {};
    [...banks, ...ewallet].forEach(opt => { bankMap[opt.value] = opt.label; });

    const select = document.getElementById('code_bank');
    const labelSelect = document.getElementById('label-select');

    function loadOptions(tab) {
      select.innerHTML = '';
      const list = tab === 'bank' ? banks : ewallet;
      list.forEach(opt => {
        const option = document.createElement('option');
        option.value = opt.value;
        option.textContent = opt.label;
        select.appendChild(option);
      });
      labelSelect.textContent = tab === 'bank' ? 'PILIH BANK' : 'PILIH E-WALLET';
    }

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tab-bank').classList.toggle('tab-active', tab === 'bank');
      document.getElementById('tab-ewallet').classList.toggle('tab-active', tab === 'ewallet');
      loadOptions(tab);
    }

    // Form & Result logic (sama seperti sebelumnya)
    const form = document.getElementById('checkForm');
    const resultDiv = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');
    const historyDiv = document.getElementById('history');

    function loadHistory() {
      const history = JSON.parse(localStorage.getItem('cekRekeningHistory') || '[]');
      if (history.length === 0) {
        historyDiv.innerHTML = `<div class="p-12 text-center text-white/40">Belum ada riwayat pengecekan...</div>`;
        return;
      }

      let html = `<div class="overflow-x-auto"><table class="w-full"><thead><tr class="border-b border-white/10 text-indigo-300 text-xs">
        <th class="px-8 py-5 text-left">TANGGAL</th>
        <th class="px-8 py-5 text-left">JENIS</th>
        <th class="px-8 py-5 text-left">NOMOR</th>
        <th class="px-8 py-5 text-left">NAMA PEMILIK</th>
        <th class="px-8 py-5 text-center">STATUS</th>
      </tr></thead><tbody class="divide-y divide-white/10">`;

      history.slice(0, 15).forEach(item => {
        const date = new Date(item.timestamp).toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' });
        const statusHTML = item.status === 'SUCCESS' 
          ? `<span class="inline-flex items-center gap-1 bg-emerald-500/20 text-emerald-400 px-6 py-1 rounded-3xl text-xs font-bold"><i class="fas fa-check"></i> BERHASIL</span>`
          : `<span class="inline-flex items-center gap-1 bg-red-500/20 text-red-400 px-6 py-1 rounded-3xl text-xs font-bold"><i class="fas fa-xmark"></i> GAGAL</span>`;

        html += `<tr class="hover:bg-white/5 transition-colors">
          <td class="px-8 py-5 text-white/70">${date}</td>
          <td class="px-8 py-5 font-medium">${item.bankName}</td>
          <td class="px-8 py-5">${item.account_number}</td>
          <td class="px-8 py-5 font-semibold">${item.account_holder}</td>
          <td class="px-8 py-5 text-center">${statusHTML}</td>
        </tr>`;
      });

      html += `</tbody></table></div>`;
      historyDiv.innerHTML = html;
    }

    function saveToHistory(data, code_bank, account_number) {
      let history = JSON.parse(localStorage.getItem('cekRekeningHistory') || '[]');
      history.unshift({
        timestamp: Date.now(),
        bankName: bankMap[code_bank] || code_bank.toUpperCase(),
        account_number: account_number,
        account_holder: data.account_holder || 'Invalid',
        status: data.status
      });
      if (history.length > 30) history.pop();
      localStorage.setItem('cekRekeningHistory', JSON.stringify(history));
      loadHistory();
    }

    function clearHistory() {
      if (confirm('Hapus semua riwayat?')) {
        localStorage.removeItem('cekRekeningHistory');
        loadHistory();
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const code_bank = document.getElementById('code_bank').value;
      const account_number = document.getElementById('account_number').value.trim();
      const bankName = bankMap[code_bank] || code_bank.toUpperCase();

      if (!code_bank || !account_number) return alert('Isi semua field bro!');

      submitBtn.disabled = true;
      submitBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> MENGECEK...`;

      try {
        const res = await fetch('/api/check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code_bank, account_number })
        });

        const data = await res.json();

        if (data.status === "SUCCESS") {
          resultDiv.innerHTML = `
            <div class="result-card glass rounded-3xl p-8">
              <div class="flex items-center gap-6">
                <i class="fas fa-check-circle text-7xl text-emerald-400"></i>
                <div class="flex-1">
                  <p class="text-emerald-400 font-semibold tracking-widest">BERHASIL • ${bankName}</p>
                  <p class="text-4xl font-bold mt-3">${data.account_holder}</p>
                  <p class="text-2xl text-indigo-200 mt-2">${data.account_number}</p>
                </div>
              </div>
            </div>`;
          saveToHistory(data, code_bank, account_number);
        } else {
          resultDiv.innerHTML = `
            <div class="result-card glass rounded-3xl p-8 text-center">
              <i class="fas fa-circle-xmark text-7xl text-red-400 mb-4"></i>
              <p class="text-2xl font-bold text-red-300">TIDAK DITEMUKAN / INVALID</p>
              <p class="text-white/60 mt-2">Cek kembali nomor rekening atau e-wallet kamu</p>
            </div>`;
        }
      } catch (err) {
        resultDiv.innerHTML = `<div class="glass rounded-3xl p-8 text-center text-red-400">Gagal terhubung ke server. Coba lagi nanti.</div>`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = `<i class="fas fa-magnifying-glass"></i> CEK SEKARANG`;
      }
    });

    // Inisialisasi
    loadOptions('bank');
    loadHistory();
  </script>
</body>
</html>
