<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cek Rekening & E-Wallet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen py-8">
  <div class="max-w-3xl mx-auto px-4">
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-3 bg-white px-6 py-3 rounded-3xl shadow mb-4">
        <i class="fas fa-university text-3xl text-blue-600"></i>
        <h1 class="text-3xl font-bold text-gray-900">Cek Rekening</h1>
      </div>
      <p class="text-gray-600">Bank & E-Wallet via cekbank.my.id</p>
    </div>

    <div class="bg-white rounded-3xl shadow-2xl p-8">
      <form id="checkForm" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Bank / E-Wallet</label>
          <select id="code_bank" class="w-full px-5 py-4 text-lg border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-600">
            <!-- diisi otomatis -->
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Nomor Rekening / Nomor HP</label>
          <input type="text" id="account_number" 
                 class="w-full px-5 py-4 text-lg border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-600"
                 placeholder="Contoh: 1820701960 atau 081234567890" required>
        </div>

        <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl text-xl flex items-center justify-center gap-3 transition">
          <i class="fas fa-search"></i>
          CEK SEKARANG
        </button>
      </form>

      <!-- Result -->
      <div id="result" class="mt-8"></div>
    </div>

    <!-- Riwayat Pengecekan -->
    <div class="mt-12">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-semibold flex items-center gap-2">
          <i class="fas fa-history"></i> Riwayat Pengecekan
        </h2>
        <button onclick="clearHistory()" 
                class="text-red-500 hover:text-red-700 text-sm flex items-center gap-1">
          <i class="fas fa-trash"></i> Hapus Semua
        </button>
      </div>
      <div id="history" class="bg-white rounded-3xl shadow overflow-hidden"></div>
    </div>

    <p class="text-center text-xs text-gray-400 mt-12">
      Powered by <a href="https://cekbank.my.id" target="_blank" class="underline">cekbank.my.id</a>
    </p>
  </div>

  <script>
    // Daftar lengkap bank + e-wallet (semua yang kamu kasih)
    const bankOptions = [
      { value: "all_ewallet", label: "🔥 CEK SEMUA E-WALLET SEKALIGUS" },
      { value: "gopay", label: "GoPay" },
      { value: "ovo", label: "OVO" },
      { value: "dana", label: "Dana" },
      { value: "shopeepay", label: "ShopeePay" },
      { value: "linkaja", label: "LinkAja" },
      { value: "bca", label: "BCA - Bank Central Asia" },
      { value: "bni", label: "BNI" },
      { value: "bri", label: "BRI - Bank Rakyat Indonesia" },
      { value: "mandiri", label: "Bank Mandiri" },
      { value: "bsi", label: "BSI (Bank Syariah Indonesia)" },
      { value: "btn", label: "BTN / BTN Syariah" },
      { value: "permata", label: "Permata Bank" },
      { value: "danamon", label: "Bank Danamon" },
      { value: "cimb", label: "CIMB Niaga" },
      { value: "ocbc", label: "OCBC NISP" },
      { value: "maybank", label: "Maybank Indonesia" },
      { value: "bjb", label: "BJB" },
      { value: "bjb_syr", label: "BJB Syariah" },
      { value: "panin", label: "Panin Bank" },
      { value: "uob", label: "TMRW / UOB" },
      { value: "jago", label: "Bank Jago" },
      { value: "nobu", label: "Nobu Bank" },
      { value: "harda", label: "Allo Bank / Bank Harda Internasional" },
      { value: "mandiri", label: "Bank Mandiri" },
      { value: "mantap", label: "Bank MANTAP (Mandiri Taspen)" },
      { value: "mega", label: "Bank Mega" },
      { value: "bukopin", label: "Bank Bukopin" },
      { value: "sinarmas", label: "Bank Sinarmas" },
      // Kamu bisa tambah sisanya dari list kamu kalau mau lebih lengkap
    ];

    const bankMap = {};
    bankOptions.forEach(opt => { bankMap[opt.value] = opt.label; });

    const select = document.getElementById('code_bank');
    bankOptions.forEach(opt => {
      const option = document.createElement('option');
      option.value = opt.value;
      option.textContent = opt.label;
      select.appendChild(option);
    });

    const form = document.getElementById('checkForm');
    const resultDiv = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');
    const historyDiv = document.getElementById('history');

    function loadHistory() {
      const history = JSON.parse(localStorage.getItem('cekRekeningHistory') || '[]');
      if (history.length === 0) {
        historyDiv.innerHTML = `<div class="p-8 text-center text-gray-400 italic">Belum ada riwayat pengecekan.</div>`;
        return;
      }

      let html = `<div class="overflow-x-auto"><table class="w-full"><thead class="bg-gray-50"><tr>
        <th class="px-6 py-4 text-left text-sm font-medium text-gray-500">TANGGAL</th>
        <th class="px-6 py-4 text-left text-sm font-medium text-gray-500">BANK/EWALLET</th>
        <th class="px-6 py-4 text-left text-sm font-medium text-gray-500">NO. REKENING</th>
        <th class="px-6 py-4 text-left text-sm font-medium text-gray-500">NAMA PEMILIK</th>
        <th class="px-6 py-4 text-center text-sm font-medium text-gray-500">STATUS</th>
      </tr></thead><tbody class="divide-y">`;

      history.slice(0, 15).forEach(item => {
        const date = new Date(item.timestamp).toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' });
        const status = item.status === 'SUCCESS' 
          ? `<span class="inline-block bg-green-100 text-green-700 px-4 py-1 rounded-full text-xs font-medium">BERHASIL</span>`
          : `<span class="inline-block bg-red-100 text-red-700 px-4 py-1 rounded-full text-xs font-medium">GAGAL</span>`;

        html += `<tr class="hover:bg-gray-50">
          <td class="px-6 py-4 text-sm text-gray-600">${date}</td>
          <td class="px-6 py-4 text-sm font-medium">${item.bankName}</td>
          <td class="px-6 py-4 text-sm">${item.account_number}</td>
          <td class="px-6 py-4 text-sm font-medium">${item.account_holder}</td>
          <td class="px-6 py-4 text-center">${status}</td>
        </tr>`;
      });

      html += `</tbody></table></div>`;
      historyDiv.innerHTML = html;
    }

    function saveToHistory(data, code_bank, account_number) {
      let history = JSON.parse(localStorage.getItem('cekRekeningHistory') || '[]');
      const bankName = bankMap[code_bank] || code_bank.toUpperCase();

      history.unshift({
        timestamp: Date.now(),
        bankName: bankName,
        account_number: account_number,
        account_holder: data.account_holder || 'Invalid',
        status: data.status
      });

      if (history.length > 30) history.pop();
      localStorage.setItem('cekRekeningHistory', JSON.stringify(history));
      loadHistory();
    }

    function clearHistory() {
      if (confirm('Hapus SEMUA riwayat pengecekan?')) {
        localStorage.removeItem('cekRekeningHistory');
        loadHistory();
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const code_bank = document.getElementById('code_bank').value;
      const account_number = document.getElementById('account_number').value.trim();
      const bankName = bankMap[code_bank] || code_bank.toUpperCase();

      if (!code_bank || !account_number) return alert('Isi semua field!');

      submitBtn.disabled = true;
      submitBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Sedang mengecek...`;

      try {
        const res = await fetch('/api/check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code_bank, account_number })
        });

        const data = await res.json();

        if (data.status === "SUCCESS") {
          resultDiv.innerHTML = `
            <div class="bg-green-50 border border-green-200 rounded-3xl p-8">
              <div class="flex items-center gap-4">
                <i class="fas fa-check-circle text-6xl text-green-500"></i>
                <div class="flex-1">
                  <p class="text-green-700 font-semibold">✅ Berhasil!</p>
                  <p class="text-2xl font-bold text-gray-900 mt-1">${bankName}</p>
                  <p class="text-3xl font-bold text-gray-800 mt-4">${data.account_holder}</p>
                  <p class="text-lg text-gray-600 mt-2">${data.account_number}</p>
                </div>
              </div>
            </div>`;
          saveToHistory(data, code_bank, account_number);
        } else {
          resultDiv.innerHTML = `
            <div class="bg-red-50 border border-red-200 rounded-3xl p-8 text-center">
              <i class="fas fa-times-circle text-6xl text-red-500 mb-4"></i>
              <h3 class="text-red-700 text-2xl font-semibold">Tidak Ditemukan / Invalid</h3>
              <p class="text-gray-600 mt-3">Cek kembali nomor rekening atau e-wallet kamu</p>
            </div>`;
        }
      } catch (err) {
        resultDiv.innerHTML = `<div class="bg-red-50 border border-red-200 rounded-3xl p-8 text-center text-red-600">Gagal terhubung ke server. Coba lagi nanti.</div>`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = `<i class="fas fa-search"></i> CEK SEKARANG`;
      }
    });

    // Load riwayat saat halaman dibuka
    loadHistory();
  </script>
</body>
</html>
